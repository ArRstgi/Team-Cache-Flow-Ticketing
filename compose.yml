# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team Project compose.yml
#
# This file defines the Holmes investigation container and a shared network.
# Add your own services below the "Add your services here" section.
#
# Every service you add must be attached to `team-net` so it is reachable
# from holmes by service name.
#
# Quick reference:
#   Start everything:          docker compose up --build
#   Open a shell in holmes:    docker compose exec holmes bash
#   View logs:                 docker compose logs -f
#   Check health:              docker compose ps
# ─────────────────────────────────────────────────────────────────────────────

name: event-ticketing

networks:
  team-net:
    driver: bridge

services:

  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.


  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color


    # Holmes has no ports — access it via: docker compose exec holmes bash

  # ── Add your services here ─────────────────────────────────────────────────
  #
  # Pattern for each service:
  #
  # your-service:
  #   build: ./your-service
  #   container_name: your-service
  #   restart: unless-stopped
  #   ports:
  #     - "3001:3001"          # expose on host for local testing
  #   networks:
  #     - team-net             # REQUIRED — makes it reachable from holmes
  #   environment:
  #     - DATABASE_URL=postgres://user:pass@postgres:5432/yourdb
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 15s
  #
  # ── Postgres template ──────────────────────────────────────────────────────
  #


  catalog:
    build: ./catalog
    container_name: catalog
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - team-net
    environment:
      - DATABASE_URL=postgres://user:pass@postgres:5432/mydb
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    
    
  purchase:
    build: ./purchase
    container_name: purchase
    restart: unless-stopped
    ports:
      - "9001:9001"
    networks:
      - team-net  
    environment:
      - DATABASE_URL=postgres://app:secret@purchase-db:5432/purchases
      - REDIS_URL=redis://redis:6379
      - PAYMENT_URL=http://payment:3000
    depends_on:
      purchase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s 

  payment:
    build: ./payment
    container_name: payment
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    ports:
      - "3002:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - team-net

  notification:
    build: ./notifications
    container_name: notification
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=notification-service
    networks:
      - team-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  waitlist:
    build: ./waitlist
    networks:
      - team-net  
    ports:
      - "3010:3010"
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_NAME=waitlist
      - DLQ_NAME=waitlist_dlq
      - PORT=3010
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3010/health']
      interval: 10s 
      timeout: 5s 
      retries: 3 
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # analytics:
  #   build: ./analytics
  #   networks:
  #     - team-net  
  
  refund:
    build: ./refund
    container_name: refund
    networks:
      - team-net
    ports:
      - "3004:3000"
    environment:
      DATABASE_URL: postgres://app:secret@refund-db:5432/refunds
      REDIS_URL: redis://redis:6379
      PURCHASE_SERVICE_URL: http://purchase:9001
      PAYMENT_SERVICE_URL: http://payment:3000
      SERVICE_NAME: refund
      PORT: 3000
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      refund-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment:
        condition: service_healthy
    restart: unless-stopped

  fraud-detection:
   build: ./fraudDetection
   networks:
     - team-net  
   environment:
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: fraud-detection
   depends_on:
      redis:
        condition: service_healthy
   restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    # restart: unless-stopped
    networks:
      - team-net
    ports:
      - "80:3010" #80 for default with no port
    environment:
      - OUTER_PORT=80
      - INNER_PORT=3010
      - REDIS_URL=redis://redis:6379
      # points to the other services. used to display if they're running
      # name, url, port
      - SERVICE_URLS=
          Catalog,http://catalog:3000
          Refund,http://refund:3001
          Payment,http://payment:3000
          Notification,http://notification:3000
          Waitlist,http://waitlist:3010
          Purchase,http://purchase:9001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 10s 
      timeout: 5s 
      retries: 3 
      start_period: 15s 
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  refund-db:
    image: postgres:16
    container_name: refund-db
    networks:
      - team-net  
    environment:
      POSTGRES_DB: refunds
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - refund-data:/var/lib/postgresql/data
      - ./refund/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d refunds']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  
  purchase-db:
    image: postgres:16
    container_name: purchase-db
    networks:
      - team-net
    environment:
      POSTGRES_DB: purchases
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - purchase-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d purchases']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 3s
      retries: 5
    

# ── Named volumes ──────────────────────────────────────────────────────────────
# Declare a volume for each database here, e.g.:
#
volumes:
  refund-data:
  purchase-data:
  postgres-data:
